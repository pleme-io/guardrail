name: release

on:
  push:
    tags: ["guardrail-v*"]
  workflow_dispatch: {}

jobs:
  build:
    name: ${{ matrix.slug }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - slug: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/guardrail ./guardrail-${{ matrix.slug }}
          if command -v shasum &> /dev/null; then
            shasum -a 256 guardrail-${{ matrix.slug }} > guardrail-${{ matrix.slug }}.sha256
          else
            sha256sum guardrail-${{ matrix.slug }} > guardrail-${{ matrix.slug }}.sha256
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: guardrail-${{ matrix.slug }}
          path: guardrail-${{ matrix.slug }}*
          retention-days: 90

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/guardrail-*

  crates:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Fetch SOPS secrets
        run: |
          mkdir -p .sops
          curl -s -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/pleme-io/nix/contents/secrets.yaml > .sops/secrets.enc.yaml
          curl -s -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/pleme-io/nix/contents/.sops.yaml > .sops/.sops.yaml

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs#sops

      - name: Decrypt secrets
        run: sops decrypt --config .sops/.sops.yaml .sops/secrets.enc.yaml > secrets.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/download/v4.35.1/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Publish to crates.io
        env:
          CRATES_API_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
        run: |
          if [ -n "$CRATES_API_TOKEN" ]; then
            cargo publish
          else
            TOKEN=$(yq '.crates["publish-token"]' secrets.yaml)
            CARGO_REGISTRY_TOKEN="$TOKEN" cargo publish
          fi