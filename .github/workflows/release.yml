name: release

on:
  push:
    tags: ["guardrail-v*"]
  workflow_dispatch: {}

jobs:
  build:
    name: ${{ matrix.slug }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - slug: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/guardrail ./guardrail-${{ matrix.slug }}
          if command -v shasum &> /dev/null; then
            shasum -a 256 guardrail-${{ matrix.slug }} > guardrail-${{ matrix.slug }}.sha256
          else
            sha256sum guardrail-${{ matrix.slug }} > guardrail-${{ matrix.slug }}.sha256
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: guardrail-${{ matrix.slug }}
          path: guardrail-${{ matrix.slug }}*
          retention-days: 90

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/guardrail-*

  crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            secrets.yaml
            .sops.yaml
          sparse-checkout-cone-mode: false
          repository: pleme-io/nix

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs#sops nixpkgs#yq

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops decrypt secrets.yaml > decrypted.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CRATES_API_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
        run: |
          if [ -n "$CRATES_API_TOKEN" ]; then
            cargo publish
          else
            TOKEN=$(yq '.crates["publish-token"]' decrypted.yaml)
            CARGO_REGISTRY_TOKEN="$TOKEN" cargo publish
          fi