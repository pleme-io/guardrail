  message: "AWS Lambda function deletion"
  category: cloud
  test_block: "aws lambda delete-function --function-name my-function"
  test_allow: "aws lambda list-functions"

# ── Infrastructure ─────────────────────────────────────────────
- name: aws-cloudformation-delete-stack
