# Azure CLI destructive operations

# ── Compute ────────────────────────────────────────────────────
- name: az-vm-delete
  pattern: 'az\s+vm\s+delete'
  severity: block
  message: "Azure VM deletion"
  category: cloud
  test_block: "az vm delete --name my-vm --resource-group my-rg --yes"
  test_allow: "az vm list"

- name: az-vmss-delete
  pattern: 'az\s+vmss\s+delete'
  severity: block
  message: "Azure VM Scale Set deletion"
  category: cloud
  test_block: "az vmss delete --name my-vmss --resource-group my-rg"
  test_allow: "az vmss list"

- name: az-disk-delete
