# Azure CLI destructive operations

# ── Compute ────────────────────────────────────────────────────
- name: az-vm-delete
  pattern: 'az\s+vm\s+delete'
  severity: block
  message: "Azure VM deletion"
  category: cloud

- name: az-vmss-delete
  pattern: 'az\s+vmss\s+delete'
  severity: block
  message: "Azure VM Scale Set deletion"
  category: cloud

- name: az-disk-delete
  pattern: 'az\s+disk\s+delete'
  severity: warn
  message: "Azure managed disk deletion"
  category: cloud

