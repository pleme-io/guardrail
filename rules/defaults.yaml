# Compiled-in default rules — embedded via include_str!
# These ship with the binary. No config file needed for basic protection.

# ── Filesystem ─────────────────────────────────────────────────
- name: rm-rf-root
  pattern: 'rm\s+-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\s+/\s*$'
  severity: block
  message: "Recursive force-delete from root"
  category: filesystem

- name: rm-rf-home
  pattern: 'rm\s+-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\s+(~|\$HOME)\s*$'
  severity: block
  message: "Recursive force-delete of home directory"
  category: filesystem

- name: rm-rf-cwd
  pattern: 'rm\s+-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\s+\.\s*$'
  severity: block
  message: "Recursive force-delete of current directory"
  category: filesystem

- name: dd-disk-overwrite
  pattern: 'dd\s+.*of=/dev/(sd|nvme|disk|vd)'
  severity: block
  message: "Direct disk device overwrite"
  category: filesystem

- name: mkfs-format
  pattern: 'mkfs\.\w+'
  severity: block
  message: "Filesystem format command"
  category: filesystem

- name: chmod-777-recursive
  pattern: 'chmod\s+-[a-zA-Z]*R[a-zA-Z]*\s+777\s+/'
  severity: block
  message: "Recursive chmod 777 from root"
  category: filesystem

# ── Git ────────────────────────────────────────────────────────
- name: git-force-push-main
  pattern: 'git\s+push\s+.*--force[a-z-]*\s+\S+\s+(main|master)\b'
  severity: block
  message: "Force push to main/master"
  category: git

- name: git-force-push-bare
  pattern: 'git\s+push\s+--force[a-z-]*\s*$'
  severity: block
  message: "Force push without explicit branch"
  category: git

- name: git-reset-hard
  pattern: 'git\s+reset\s+--hard'
  severity: warn
  message: "git reset --hard discards uncommitted changes"
  category: git

- name: git-clean-force
  pattern: 'git\s+clean\s+-[a-zA-Z]*f'
  severity: warn
  message: "git clean -f deletes untracked files permanently"
  category: git

- name: git-branch-force-delete
  pattern: 'git\s+branch\s+-D\s'
  severity: warn
  message: "git branch -D force-deletes without merge check"
  category: git

# ── Database ───────────────────────────────────────────────────
- name: sql-drop-table
  pattern: '(?i)\bDROP\s+TABLE\b'
  severity: block
  message: "DROP TABLE — use migrations instead"
  category: database

- name: sql-drop-database
  pattern: '(?i)\bDROP\s+DATABASE\b'
  severity: block
  message: "DROP DATABASE — catastrophic data loss"
  category: database

- name: sql-drop-schema
  pattern: '(?i)\bDROP\s+SCHEMA\b'
  severity: block
  message: "DROP SCHEMA"
  category: database

- name: sql-truncate
  pattern: '(?i)\bTRUNCATE\s+(TABLE\s+)?\w'
  severity: block
  message: "TRUNCATE — irreversible data deletion"
  category: database

- name: sql-delete-no-where
  pattern: '(?i)\bDELETE\s+FROM\s+\w+\s*[;''")\s]*$'
  severity: block
  message: "DELETE FROM without WHERE — deletes all rows"
  category: database

# ── Kubernetes ─────────────────────────────────────────────────
- name: kubectl-delete-namespace
  pattern: 'kubectl\s+delete\s+(ns|namespace)\s'
  severity: block
  message: "Deleting a Kubernetes namespace destroys all resources in it"
  category: kubernetes

- name: kubectl-delete-all
  pattern: 'kubectl\s+delete\s+\S+\s+--all\b'
  severity: block
  message: "kubectl delete --all — mass resource deletion"
  category: kubernetes

- name: helm-uninstall-prod
  pattern: 'helm\s+uninstall\s+.*-n\s+(prod|production)\b'
  severity: block
  message: "Helm uninstall in production namespace"
  category: kubernetes

# ── Nix ────────────────────────────────────────────────────────
- name: nix-gc-delete-old
  pattern: 'nix-collect-garbage\s+-d'
  severity: warn
  message: "Deletes all old Nix generations — cannot rollback"
  category: nix

- name: nix-store-gc
  pattern: 'nix\s+store\s+gc'
  severity: warn
  message: "Nix store garbage collection"
  category: nix

# ── Docker ─────────────────────────────────────────────────────
- name: docker-system-prune
  pattern: 'docker\s+system\s+prune'
  severity: warn
  message: "Docker system prune removes all unused images, containers, networks"
  category: docker

- name: docker-volume-prune
  pattern: 'docker\s+volume\s+prune'
  severity: warn
  message: "Docker volume prune destroys persistent data"
  category: docker

# ── Secrets ────────────────────────────────────────────────────
- name: sops-decrypt-pipe
  pattern: 'sops\s+(-d|--decrypt)\s+.*\|'
  severity: warn
  message: "Decrypting secrets and piping output — verify destination"
  category: secrets

- name: env-secret-echo
  pattern: 'echo\s+.*\$(GITHUB_TOKEN|AWS_SECRET|DATABASE_URL|API_KEY|PRIVATE_KEY)'
  severity: warn
  message: "Echoing secret environment variable"
  category: secrets

# ── Terraform / IaC ───────────────────────────────────────────
- name: terraform-destroy
  pattern: 'terraform\s+destroy'
  severity: block
  message: "terraform destroy tears down all managed infrastructure"
  category: terraform

- name: terraform-apply-auto
  pattern: 'terraform\s+apply\s+.*-auto-approve'
  severity: warn
  message: "terraform apply -auto-approve skips confirmation"
  category: terraform

- name: terraform-force-unlock
  pattern: 'terraform\s+force-unlock'
  severity: block
  message: "terraform force-unlock can corrupt state"
  category: terraform

- name: terraform-state-rm
  pattern: 'terraform\s+state\s+rm\b'
  severity: block
  message: "terraform state rm removes resources from state without destroying them"
  category: terraform

- name: terraform-taint
  pattern: 'terraform\s+taint\b'
  severity: warn
  message: "terraform taint marks resource for destruction on next apply"
  category: terraform

- name: pulumi-destroy
  pattern: 'pulumi\s+destroy'
  severity: block
  message: "pulumi destroy tears down all managed infrastructure"
  category: terraform

- name: pulumi-cancel
  pattern: 'pulumi\s+cancel'
  severity: block
  message: "pulumi cancel can corrupt deployment state"
  category: terraform

- name: ansible-playbook-prod
  pattern: 'ansible-playbook\s+.*(-l|--limit)\s+(prod|production)\b'
  severity: warn
  message: "ansible-playbook targeting production — verify intent"
  category: terraform

- name: crossplane-delete-claim
  pattern: 'kubectl\s+delete\s+(claim|composite)'
  severity: warn
  message: "Deleting Crossplane claim destroys managed cloud resources"
  category: terraform

# ── Cloud CLI ─────────────────────────────────────────────────
- name: aws-ec2-terminate
  pattern: 'aws\s+ec2\s+terminate-instances'
  severity: block
  message: "AWS EC2 instance termination"
  category: cloud

- name: aws-s3-rb
  pattern: 'aws\s+s3\s+rb\s+.*--force'
  severity: block
  message: "AWS S3 force-remove bucket (deletes all objects + bucket)"
  category: cloud

- name: aws-s3-rm-recursive
  pattern: 'aws\s+s3\s+rm\s+.*--recursive'
  severity: warn
  message: "AWS S3 recursive delete"
  category: cloud

- name: aws-rds-delete
  pattern: 'aws\s+rds\s+delete-db-(instance|cluster)'
  severity: block
  message: "AWS RDS database deletion"
  category: cloud

- name: aws-iam-delete
  pattern: 'aws\s+iam\s+delete-(role|user|policy)'
  severity: warn
  message: "AWS IAM deletion — may break access"
  category: cloud

- name: gcloud-compute-delete
  pattern: 'gcloud\s+compute\s+instances\s+delete'
  severity: block
  message: "GCP compute instance deletion"
  category: cloud

- name: gcloud-sql-delete
  pattern: 'gcloud\s+sql\s+instances\s+delete'
  severity: block
  message: "GCP Cloud SQL instance deletion"
  category: cloud

- name: az-vm-delete
  pattern: 'az\s+vm\s+delete'
  severity: block
  message: "Azure VM deletion"
  category: cloud

- name: az-group-delete
  pattern: 'az\s+group\s+delete'
  severity: block
  message: "Azure resource group deletion — destroys all resources in group"
  category: cloud

- name: az-sql-delete
  pattern: 'az\s+sql\s+(server|db)\s+delete'
  severity: block
  message: "Azure SQL database/server deletion"
  category: cloud

- name: az-storage-delete
  pattern: 'az\s+storage\s+(account|container)\s+delete'
  severity: block
  message: "Azure storage account/container deletion"
  category: cloud

- name: aws-dynamodb-delete
  pattern: 'aws\s+dynamodb\s+delete-table'
  severity: block
  message: "AWS DynamoDB table deletion"
  category: cloud

- name: aws-eks-delete
  pattern: 'aws\s+eks\s+delete-cluster'
  severity: block
  message: "AWS EKS cluster deletion"
  category: cloud

- name: aws-cloudformation-delete
  pattern: 'aws\s+cloudformation\s+delete-stack'
  severity: block
  message: "AWS CloudFormation stack deletion — destroys all stack resources"
  category: cloud

- name: aws-lambda-delete
  pattern: 'aws\s+lambda\s+delete-function'
  severity: warn
  message: "AWS Lambda function deletion"
  category: cloud

- name: aws-route53-delete
  pattern: 'aws\s+route53\s+delete-hosted-zone'
  severity: block
  message: "AWS Route53 hosted zone deletion — DNS records lost"
  category: cloud

- name: gcloud-project-delete
  pattern: 'gcloud\s+projects\s+delete'
  severity: block
  message: "GCP project deletion — destroys everything in the project"
  category: cloud

- name: gcloud-gke-delete
  pattern: 'gcloud\s+container\s+clusters\s+delete'
  severity: block
  message: "GCP GKE cluster deletion"
  category: cloud

- name: gcloud-storage-delete
  pattern: 'gsutil\s+(rm\s+-r|rb)\s+gs://'
  severity: block
  message: "GCP Cloud Storage bucket/recursive deletion"
  category: cloud

- name: az-aks-delete
  pattern: 'az\s+aks\s+delete'
  severity: block
  message: "Azure AKS cluster deletion"
  category: cloud

# ── FluxCD / GitOps ───────────────────────────────────────────
- name: flux-uninstall
  pattern: 'flux\s+uninstall'
  severity: block
  message: "flux uninstall removes the entire GitOps controller"
  category: flux

- name: flux-delete-source
  pattern: 'flux\s+delete\s+source'
  severity: warn
  message: "Deleting Flux source disconnects GitOps reconciliation"
  category: flux

- name: flux-delete-kustomization
  pattern: 'flux\s+delete\s+kustomization'
  severity: warn
  message: "Deleting Flux kustomization stops reconciliation of managed resources"
  category: flux

- name: flux-suspend-all
  pattern: 'flux\s+suspend\s+.*--all'
  severity: warn
  message: "Suspending all Flux reconciliation"
  category: flux
